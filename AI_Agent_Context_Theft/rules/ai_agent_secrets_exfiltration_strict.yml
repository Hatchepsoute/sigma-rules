title: Likely infostealer access to AI agent authentication secrets
id: 02b62c0a-0c3f-11f1-aa25-c7684f6249e0
status: experimental
description: |
  Detects high-confidence access to AI agent authentication configuration files containing
  reusable gateway tokens by suspicious processes or by processes running from user-writable
  paths. AI-agent-specific filenames are used to reduce false positives from generic
  config.json or auth.json files found in every development environment.

related:
  - id: f1c4f294-0c3b-11f1-91a0-43ffe196cff2
    type: similar
  - id: f59de936-0c3e-11f1-97ae-9704b79e784d
    type: similar
  - id: a7b8c9d0-1e2f-3a4b-5c6d-7e8f9a0b1c2d
    type: similar

references:
  - https://www.infostealers.com/article/hudson-rock-identifies-real-world-infostealer-infection-targeting-openclaw-configurations/

author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-02-16
modified: 2026-06-19

tags:
  - attack.credential-access
  - attack.t1552
  - attack.t1552.001
  - attack.t1555

logsource:
  category: file_event
  product: windows

detection:
  # AI-agent-specific auth files; avoids generic config.json/auth.json noise
  selection_auth_file:
    TargetFilename|endswith:
      - 'openclaw.json'
      - 'paired.json'
      - 'pending.json'
      - 'device-auth.json'
      - 'gateway-token.json'

  # Suspicious execution context: process image running from user-writable paths
  selection_suspicious_context:
    Image|contains:
      - '\AppData\Local\Temp\'
      - '\AppData\Roaming\Temp\'
      - '\Downloads\'
      - '\Users\Public\'

  # Processes that should never read agent authentication files
  selection_suspicious_process:
    Image|endswith:
      - '\svchost.exe'
      - '\rundll32.exe'
      - '\wmiprvse.exe'
      - '\dllhost.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'

  filter_legitimate:
    Image|endswith:
      - '\OpenClaw.exe'
      - '\python.exe'
      - '\node.exe'
      - '\code.exe'

  condition: selection_auth_file and (selection_suspicious_context or selection_suspicious_process) and not filter_legitimate

fields:
  - TargetFilename
  - Image
  - ProcessId
  - User
  - Computer

falsepositives:
  - Developer scripts legitimately exporting config files for backup (allowlist by Image path)
  - Legitimate troubleshooting with a documented change ticket
  - Python or Node.js AI agent runtimes reading auth files at startup (filtered)

level: high
