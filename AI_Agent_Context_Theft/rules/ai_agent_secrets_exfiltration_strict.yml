title: Likely Infostealer Access to AI Agent Authentication Secrets
id: 02b62c0a-0c3f-11f1-aa25-c7684f6249e0
status: experimental
description: >
  Detects high-confidence access to AI agent authentication configuration files containing
  reusable gateway tokens by suspicious processes.

  FIXES:
  - Removed `Image|endswith: '*.tmp'` — Sigma endswith does not support globs; this
    matched the literal string "*.tmp" and would never fire.
  - Removed powershell.exe and cmd.exe from filter_legitimate — these are primary infostealer
    delivery vehicles. Filtering them eliminates the most common attack vector.
  - Narrowed selection_auth_file: 'config.json', 'auth.json', '.env' are extremely common
    generic filenames present in virtually every development environment. Replaced with
    AI-agent-specific filenames to reduce FP.
  - svchost.exe and wmiprvse.exe added as specifically suspicious when accessing these files.
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-02-16
modified: 2026-06-19
references:
  - https://www.infostealers.com/article/hudson-rock-identifies-real-world-infostealer-infection-targeting-openclaw-configurations/
tags:
  - attack.credential-access
  - attack.t1555
logsource:
  category: file_event
  product: windows
detection:
  # AI-agent-specific auth files (narrowed from generic config.json/auth.json)
  selection_auth_file:
    TargetFilename|endswith:
      - 'openclaw.json'
      - 'paired.json'
      - 'pending.json'
      - 'device-auth.json'
      - 'gateway-token.json'

  # Suspicious execution context: process running from user-writable non-standard paths
  selection_suspicious_context:
    Image|contains:
      - '\AppData\Local\Temp\'
      - '\AppData\Roaming\Temp\'
      - '\Downloads\'
      - '\Users\Public\'

  # Processes that should never read agent auth files
  selection_suspicious_process:
    Image|endswith:
      - '\svchost.exe'
      - '\rundll32.exe'
      - '\wmiprvse.exe'
      - '\dllhost.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'

  filter_legitimate:
    Image|endswith:
      - '\OpenClaw.exe'
      - '\python.exe'
      - '\node.exe'
      - '\code.exe'

  condition: selection_auth_file and (selection_suspicious_context or selection_suspicious_process) and not filter_legitimate

falsepositives:
  - Developer scripts legitimately exporting config files for backup
  - Legitimate troubleshooting with documented change ticket
level: high
