title: Suspicious access to AI agent configuration or memory files
id: f1c4f294-0c3b-11f1-91a0-43ffe196cff2
status: experimental
description: |
  Detects access to local AI agent configuration or memory files (OpenClaw and similar agents)
  by unexpected processes. These files may contain authentication tokens, cryptographic material,
  or sensitive contextual data that infostealers harvest for credential theft or agent
  impersonation.

  BROAD rule: any suspicious process accessing the OpenClaw directory or known config filenames.
  Expect some noise from developer tooling; tune filter_legitimate to the environment.

related:
  - id: f59de936-0c3e-11f1-97ae-9704b79e784d
    type: similar
  - id: a7b8c9d0-1e2f-3a4b-5c6d-7e8f9a0b1c2d
    type: similar
  - id: 02b62c0a-0c3f-11f1-aa25-c7684f6249e0
    type: similar

references:
  - https://www.infostealers.com/article/hudson-rock-identifies-real-world-infostealer-infection-targeting-openclaw-configurations/

author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-02-16
modified: 2026-06-21

tags:
  - attack.collection
  - attack.credential-access
  - attack.t1005
  - attack.t1552
  - attack.t1552.001

logsource:
  category: file_event
  product: windows

detection:
  # Single-backslash paths; Sysmon EID 11 logs Windows paths with single backslashes.
  selection_directory:
    TargetFilename|contains:
      - '\.openclaw\'
      - '\.openc1aw\'
      - '\OpenClaw\'

  selection_files:
    TargetFilename|endswith:
      - 'openclaw.json'
      - 'SOUL.md'
      - 'MEMORY.md'
      - 'AGENTS.md'
      - 'USER.md'
      - 'paired.json'
      - 'pending.json'
      - 'device-auth.json'

  # Processes not expected to read AI agent config files
  # SECOND CHALLENGE 2026-06-21: added pythonw.exe (headless Python, common in infostealer droppers),
  # node.exe (Node.js runtime used by npm-based stealers), certutil.exe and bitsadmin.exe
  # (LOLBins that can be used to read/exfiltrate files without spawning a shell window).
  selection_suspicious_accessor:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
      - '\curl.exe'
      - '\wget.exe'
      - '\python.exe'
      - '\pythonw.exe'
      - '\node.exe'
      - '\certutil.exe'
      - '\bitsadmin.exe'

  filter_legitimate:
    Image|endswith:
      - '\OpenClaw.exe'
      - '\code.exe'
      - '\notepad.exe'
      - '\explorer.exe'

  condition: (selection_directory or selection_files) and selection_suspicious_accessor and not filter_legitimate

fields:
  - TargetFilename
  - Image
  - ProcessId
  - User
  - Computer

falsepositives:
  - Legitimate backup or audit tools reading config directories (allowlist by Image path)
  - Developer scripts copying or inspecting agent files during debugging
  - User manually opening files via explorer or notepad (filtered)

level: medium
