    type: similar

references:
  - https://attack.mitre.org/techniques/T1552/
  - https://attack.mitre.org/techniques/T1554/
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://www.infostealers.com/article/hudson-rock-identifies-real-world-infostealer-infection-targeting-openclaw-configurations/

author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-02-16
modified: 2026-06-22

tags:
  - attack.credential-access
  - attack.persistence
  - attack.t1552
  - attack.t1552.001
  - attack.t1554

logsource:
  category: file_event
  product: windows

detection:
  selection_crypto_files:
    TargetFilename|endswith:
      - 'device.json'
      - '.pem'

  # Branch 1: process image itself is staged in a user-writable path (infostealer staging).
  # Single-backslash paths; Sysmon EID 11 uses single backslashes in TargetFilename and Image.
  selection_suspicious_path:
    Image|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Downloads\'
      - '\Users\Public\'

  # Branch 2: processes that should never read cryptographic identity files.
  # SECOND CHALLENGE 2026-06-22: added regsvcs.exe and regasm.exe (.NET COM registration utilities
  # signed by Microsoft, abused as proxy-execution LOLBins to run arbitrary .NET assemblies without
  # spawning a visible shell). Also added pythonw.exe (headless Python runtime used by infostealer
  # droppers — was present in the BROAD rule's selection_suspicious_accessor but missing here).
  selection_suspicious_process:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\rundll32.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\curl.exe'
      - '\wget.exe'
      - '\pythonw.exe'
      - '\regsvcs.exe'
      - '\regasm.exe'

  filter_legitimate:
    Image|endswith:
      - '\OpenClaw.exe'
      - '\python.exe'
      - '\node.exe'
      - '\code.exe'
      - '\openssl.exe'

  condition: selection_crypto_files and (selection_suspicious_path or selection_suspicious_process) and not filter_legitimate

fields:
  - TargetFilename
  - Image
  - ProcessId
  - User
  - Computer

falsepositives:
  - OpenSSL or developer tooling reading PEM files for legitimate TLS configuration (filtered via openssl.exe)
  - Authorized security audit scripts accessing device identity files with a documented change ticket
  - Python-based AI agent runtimes reading device.json at startup (filtered via python.exe)
  - .NET COM registration tools (regsvcs.exe, regasm.exe) used for legitimate COM component registration unrelated to AI agents (validate by examining TargetFilename and process context)

level: critical
