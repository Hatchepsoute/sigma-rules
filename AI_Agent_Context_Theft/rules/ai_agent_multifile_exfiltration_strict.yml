title: Single Process Accessing Multiple Critical AI Agent Files
id: a7b8c9d0-1e2f-3a4b-5c6d-7e8f9a0b1c2d
status: experimental
description: >
  Detects access to critical AI agent files (authentication, cryptographic identity and memory)
  by suspicious processes. Strongly indicating agent compromise or credential theft.

  CRITICAL FIX: The previous condition required ALL four selection blocks to be true on a
  SINGLE file_event. Since each file_event covers ONE file at a time, the condition
  `selection_dir AND selection_auth AND selection_crypto AND selection_memory` could NEVER
  fire — it requires the same event to match four different filenames simultaneously.
  Fixed to OR logic: any one of the critical file types accessed by a suspicious process
  constitutes an alert. Correlation across multiple events should be done at the SIEM layer
  (e.g., same ProcessId or same host within a 5-minute window).

  For full multi-file correlation, use this rule as input to an EQL/Elasticsearch sequence rule.
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-02-17
modified: 2026-06-19
references:
  - https://www.infostealers.com/article/hudson-rock-identifies-real-world-infostealer-infection-targeting-openclaw-configurations/
tags:
  - attack.collection
  - attack.credential-access
  - attack.t1005
  - attack.t1552
logsource:
  category: file_event
  product: windows
detection:
  selection_openclaw_dir:
    TargetFilename|contains:
      - '\.openclaw\'
      - '\.openc1aw\'

  selection_critical_files:
    TargetFilename|endswith:
      - 'openclaw.json'
      - 'device.json'
      - 'SOUL.md'
      - 'MEMORY.md'
      - 'AGENTS.md'

  selection_suspicious_accessor:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\rundll32.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\python.exe'
      - '\curl.exe'
      - '\wget.exe'

  filter_legitimate:
    Image|endswith:
      - '\OpenClaw.exe'
      - '\code.exe'
      - '\notepad.exe'
      - '\explorer.exe'

  condition: (selection_openclaw_dir or selection_critical_files) and selection_suspicious_accessor and not filter_legitimate

falsepositives:
  - Extremely rare — developer scripts legitimately copying config files
  - Backup tools reading AI agent directories (should be allowlisted by Image path)

level: critical
