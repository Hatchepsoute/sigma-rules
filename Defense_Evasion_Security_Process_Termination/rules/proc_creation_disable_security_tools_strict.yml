title: High-confidence security tool disable via command line
id: 7f1a3c2e-0c9f-4e3a-9f45-1c4b2a9d6e3f
status: experimental
description: High-confidence detection of explicit CLI-based disabling of security/EDR/AV tools with named process or service targets.
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-02-08
modified: 2026-06-21
related:
  - id: 3c2d9b7a-9f4d-4b8f-8c2a-6a7a2f7b1c4e
    type: similar
  - id: 5d6b7a2c-3f2e-4b91-9a7e-8f9c1b2a7d11
    type: similar
tags:
  - attack.defense-evasion
  - attack.t1562
  - attack.t1562.001
logsource:
  category: process_creation
  product: windows

detection:
  selection_taskkill_im:
    Image|endswith: '\taskkill.exe'
    CommandLine|contains|all:
      - '/F'
      - '/IM'
    CommandLine|contains:
      - 'MsMpEng.exe'
      - 'SenseIR.exe'
      - 'SenseCE.exe'
      - 'CSFalconService.exe'
      - 'cb.exe'
      - 'RepUx.exe'
      - 'SentinelAgent.exe'
      - 'Sysmon.exe'

  selection_sc_stop_service:
    Image|endswith: '\sc.exe'
    CommandLine|contains: 'stop'
    CommandLine|contains:
      - 'WinDefend'
      - 'WdNisSvc'
      - 'Sense'
      - 'SecurityHealthService'

  selection_net_stop_service:
    Image|endswith: '\net.exe'
    CommandLine|contains: 'stop'
    CommandLine|contains:
      - 'WinDefend'
      - 'WdNisSvc'
      - 'Sense'
      - 'SecurityHealthService'

  selection_powershell_defender_tamper:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Set-MpPreference'
      - 'DisableRealtimeMonitoring'
      - 'Add-MpPreference'
      - 'ExclusionPath'
      - 'ExclusionProcess'
      - 'ExclusionExtension'

  selection_wmic_delete_security_process:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'process'
      - 'where'
      - 'delete'
    CommandLine|contains:
      - 'MsMpEng.exe'
      - 'SenseIR.exe'
      - 'SenseCE.exe'
      - 'CSFalconService.exe'

  filter_main_legitimate_admin_tools:
    ParentImage|endswith:
      - '\msiexec.exe'
      - '\TrustedInstaller.exe'
      - '\ccmexec.exe'

  condition: >
    (
      selection_taskkill_im
      or selection_sc_stop_service
      or selection_net_stop_service
      or selection_powershell_defender_tamper
      or selection_wmic_delete_security_process
    )
    and not filter_main_legitimate_admin_tools

fields:
  - UtcTime
  - Computer
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - IntegrityLevel
  - ProcessId
  - ParentProcessId

falsepositives:
  - Security administrators explicitly disabling Defender features during documented maintenance windows
  - Endpoint hardening or golden image scripts that set Defender exclusions (parent msiexec/TrustedInstaller — filtered)
  - SCCM/ConfigMgr (ccmexec.exe) managed deployments that reconfigure AV settings (filtered)
  - Incident response containment actions where defenders stop EDR components under a change ticket

level: high
