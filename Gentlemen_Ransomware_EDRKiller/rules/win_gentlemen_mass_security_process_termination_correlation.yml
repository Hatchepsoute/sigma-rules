title: Gentlemen Ransomware - Mass Security Process Termination by Single Process (EDR Killer Behavior) - STRICT
id: d4b8f2a1-6c95-4e3d-9f08-2a7e1b5c8d63
status: experimental
description: |
  Behavioral correlation that fires when a single source process accesses many distinct security/EDR product processes within a short window - the core behavior of an EDR killer such as Gentlemen's GentleKiller, which terminates 400+ security processes across ~48 vendors in a loop. This detection is resilient to tool renaming, repacking and new BYOVD drivers because it keys on the killing behavior, not on file artifacts. Pair it with the BYOVD driver-load BROAD rule and the GentlemenCollection STRICT rule for full-confidence attribution.
  Tune the threshold (default: >= 8 distinct security processes in 1 minute) to your environment.
references:
    - https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/
author: ASSIONGBON Adama SOC & CTI Consultant | https://www.linkedin.com/in/adama-assiongbon-9029893a/
date: 2026-06-19
modified: 2026-06-19
tags:
    - attack.defense-evasion
    - attack.t1562.001
correlation:
    type: value_count
    rules:
        - gentlemen_security_process_access
    group-by:
        - SourceImage
        - Computer
    timespan: 1m
    condition:
        gte: 8
        field: TargetImage
level: high
