title: Security Product Process Access (building block for EDR-killer correlation)
id: c9e1a4d6-3f82-4b7e-8a14-7d0b6c5e2f31
name: gentlemen_security_process_access
status: experimental
description: |
  Building-block rule: a process opening a handle to a known security/EDR product process. Not actionable on its own (security tools and the OS access each other constantly); it exists only to feed the mass-termination correlation below. Behavioral by design - resilient to EDR-killer renaming because it keys on the TARGET security processes, not on the attacker tool.
references:
    - https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/
author: ASSIONGBON Adama SOC & CTI Consultant | https://www.linkedin.com/in/adama-assiongbon-9029893a/
date: 2026-06-19
modified: 2026-06-19
tags:
    - attack.defense-evasion
    - attack.t1562.001
logsource:
    product: windows
    category: process_access
detection:
    selection_security_targets:
        TargetImage|endswith:
            - '\MsMpEng.exe'
            - '\MsSense.exe'
            - '\SecurityHealthService.exe'
            - '\CSFalconService.exe'
            - '\CSFalconContainer.exe'
            - '\SentinelAgent.exe'
            - '\SentinelServiceHost.exe'
            - '\SentinelStaticEngine.exe'
            - '\ekrn.exe'
            - '\egui.exe'
            - '\bdservicehost.exe'
            - '\bdagent.exe'
            - '\avp.exe'
            - '\kavfs.exe'
            - '\mcshield.exe'
            - '\masvc.exe'
            - '\PccNTMon.exe'
            - '\coreServiceShell.exe'
            - '\cb.exe'
            - '\RepMgr.exe'
            - '\CylanceSvc.exe'
            - '\cybereason.exe'
            - '\cortexService.exe'
            - '\Traps.exe'
            - '\fortiedr.exe'
            - '\SophosFS.exe'
            - '\SAVService.exe'
            - '\HuntressAgent.exe'
            - '\elastic-agent.exe'
            - '\ccSvcHst.exe'
            - '\SepMasterService.exe'
            - '\WRSA.exe'
            - '\TaniumClient.exe'
            - '\Sysmon.exe'
            - '\Sysmon64.exe'
    filter_legit_sources:
        SourceImage|endswith:
            - '\services.exe'
            - '\svchost.exe'
            - '\MsMpEng.exe'
            - '\CSFalconService.exe'
            - '\SentinelAgent.exe'
            - '\taskmgr.exe'
            - '\wmiprvse.exe'
    condition: selection_security_targets and not filter_legit_sources
falsepositives:
    - Endpoint management / inventory tools legitimately enumerating processes (add to filter_legit_sources)
    - Security products inspecting one another - tune filter_legit_sources to your stack
level: informational
