title: Gentlemen ransomware - GentleKiller security tool impersonation from suspicious path
id: d5f6a7b8-c9d0-4e1f-2a3b-4c5d6e7f8091
status: experimental
description: >
  Detects execution of binaries impersonating known security product names (GentleKiller tactic)
  from user-writable or non-standard paths, indicating EDR killer staging or execution.

  The Gentlemen ransomware operation deploys GentleKiller in at least eight variants that
  impersonate legitimate security products (Kaspersky, WatchDog, Javelin, ESET, Avast,
  Symantec, McAfee, Malwarebytes, Webroot, Trend Micro) and gaming/anti-cheat tools
  (Valorant/Vanguard, FACEIT, EA Anti-Cheat) to avoid suspicion. Binaries are packed with
  Enigma or Themida and carry stolen invalid digital signatures.

  DETECTION BLIND SPOT: any binary rename (WindowsUpdateHelper.exe, svchost32.exe) fully
  evades this rule. This is a defense-in-depth signal, not a primary detection layer.
  Combine with the BYOVD driver rule and the behavioral correlation rule.

  STRICT rule: impersonation name AND suspicious path are both required for the impersonation
  branch. Explicit killer tool names (GentleKiller, HexKiller…) fire on any path.

related:
  - id: c4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f80
    type: similar

references:
  - https://www.bleepingcomputer.com/news/security/gentlemen-ransomware-uses-multiple-edr-killers-to-disable-defenses/
  - https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/
  - https://attack.mitre.org/techniques/T1562/001/
  - https://attack.mitre.org/techniques/T1036/005/

author: Adama ASSIONGBON
date: 2026-06-19
modified: 2026-06-19

tags:
  - attack.defense-evasion
  - attack.t1562.001
  - attack.t1036.005

logsource:
  product: windows
  category: process_creation

detection:
  # Explicit EDR killer tool names — fire on any path
  selection_explicit_edr_killer:
    Image|contains:
      - 'GentleKiller'
      - 'HexKiller'
      - 'ThrottleBlood'
      - 'HavocKiller'
      - 'OxideHarvest'

  # Security / gaming product name impersonation
  selection_impersonating_name:
    Image|contains:
      # Kaspersky
      - 'kaspersky'
      - 'Kaspersky'
      - 'Kasps'
      # Watchdog
      - 'watchdog'
      - 'WatchDog'
      # Javelin
      - 'javelin'
      - 'Javelin'
      # Gaming / anti-cheat
      - 'valorant'
      - 'Valorant'
      - 'vanguard'
      - 'FaceIT'
      - 'faceit'
      - 'EAAntiCheat'
      - 'EASolo'
      # Security vendors
      - 'SentinelOne'
      - 'sentinelone'
      - 'CrowdStrike'
      - 'crowdstrike'
      - 'Sophos'
      - 'sophos'
      - 'BitDefender'
      - 'bitdefender'
      - 'Symantec'
      - 'symantec'
      - 'McAfee'
      - 'mcafee'
      - 'Trellix'
      - 'trellix'
      - 'Malwarebytes'
      - 'malwarebytes'
      - 'Webroot'
      - 'webroot'
      - 'TrendMicro'
      - 'trendmicro'
      - 'ESET'
      - 'Avast'
      - 'avast'

  # User-writable and non-standard execution paths
  selection_suspicious_path:
    Image|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Downloads\'
      - '\Users\Public\'
      - '\ProgramData\'
      - '\Perflogs\'
      - '\Intel\'
      - '\Recovery\'

  # Legitimate installation paths — exclude from impersonation branch
  filter_legit_kaspersky:
    Image|startswith:
      - 'C:\Program Files (x86)\Kaspersky Lab\'
      - 'C:\Program Files\Kaspersky Lab\'

  filter_legit_sentinelone:
    Image|startswith: 'C:\Program Files\SentinelOne\'

  filter_legit_crowdstrike:
    Image|startswith: 'C:\Program Files\CrowdStrike\'

  filter_legit_sophos:
    Image|startswith:
      - 'C:\Program Files\Sophos\'
      - 'C:\Program Files (x86)\Sophos\'

  filter_legit_bitdefender:
    Image|startswith:
      - 'C:\Program Files\Bitdefender\'
      - 'C:\Program Files (x86)\Bitdefender\'

  filter_legit_vanguard:
    Image|startswith:
      - 'C:\Program Files\Riot Vanguard\'
      - 'C:\Program Files (x86)\Riot Games\'

  filter_legit_symantec:
    Image|startswith:
      - 'C:\Program Files\Symantec\'
      - 'C:\Program Files (x86)\Symantec\'

  filter_legit_mcafee:
    Image|startswith:
      - 'C:\Program Files\McAfee\'
      - 'C:\Program Files (x86)\McAfee\'
      - 'C:\Program Files\Trellix\'

  filter_legit_eset:
    Image|startswith:
      - 'C:\Program Files\ESET\'
      - 'C:\Program Files (x86)\ESET\'

  filter_legit_trend:
    Image|startswith:
      - 'C:\Program Files\Trend Micro\'
      - 'C:\Program Files (x86)\Trend Micro\'

  filter_legit_avast:
    Image|startswith:
      - 'C:\Program Files\Avast Software\'
      - 'C:\Program Files (x86)\Avast Software\'

  condition: selection_explicit_edr_killer or (selection_impersonating_name and selection_suspicious_path and not (filter_legit_kaspersky or filter_legit_sentinelone or filter_legit_crowdstrike or filter_legit_sophos or filter_legit_bitdefender or filter_legit_vanguard or filter_legit_symantec or filter_legit_mcafee or filter_legit_eset or filter_legit_trend or filter_legit_avast))

fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - IntegrityLevel
  - CurrentDirectory

falsepositives:
  - Explicit EDR killer names (GentleKiller, HexKiller, etc.): virtually no legitimate use — investigate immediately
  - Impersonation + suspicious path: legitimate security software never runs from Temp/AppData — verify with vendor and change ticket
  - Riot Vanguard anti-cheat may be present in AppData on gaming systems — partially filtered
  - ESET, Avast or Sophos update processes may temporarily write to ProgramData — validate ParentImage against vendor updater

level: high
