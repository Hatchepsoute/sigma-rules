title: Gentlemen ransomware - BYOVD driver load with invalid or missing signature
id: e6a7b8c9-d0e1-4f2a-3b4c-5d6e7f809102
status: experimental
description: >
  Detects loading of a kernel driver from a user-writable or non-standard path where the digital
  signature is absent, invalid, expired or revoked — characteristic of the BYOVD technique used
  by all Gentlemen ransomware EDR killer variants.

  GentleKiller and companion tools (HexKiller, ThrottleBlood, HavocKiller) achieve kernel-level
  access via BYOVD. A key evasion feature is the use of STOLEN INVALID signatures from legitimate
  software — binaries appear signed (Signed=true) but carry expired or revoked certificates.
  Some variants use fully unsigned drivers.

  DETECTION BLIND SPOTS:
  1. Driver dropped into C:\Windows\System32\drivers\ — filtered as legitimate path.
     To cover this, monitor for unexpected driver names appearing in System32\drivers\ via
     a file_event rule (separate coverage).
  2. Driver loaded via a network/UNC path (\\server\share\evil.sys) — not covered by path
     selectors. EDR telemetry with full UNC path logging is required.
  3. SignatureStatus field values depend on the telemetry source (Sysmon EID 6 vs EDR) —
     verify field mapping before deploying on non-Sysmon backends.

related:
  - id: c4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f80
