author: Adama ASSIONGBON
date: 2026-06-19
modified: 2026-06-19

tags:
  - attack.defense-evasion
  - attack.privilege-escalation
  - attack.t1068
  - attack.t1562.001
  - attack.t1036.005

logsource:
  product: windows
  category: driver_load

detection:
  # Driver loaded from user-writable or non-standard path
  selection_suspicious_path:
    ImageLoaded|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Users\Public\'
      - '\Downloads\'
      - '\Perflogs\'
      - '\Intel\'

  # ProgramData is user-writable but also used by legitimate security vendors
  # Only flag ProgramData when combined with invalid signature (handled by condition)
  selection_programdata_path:
    ImageLoaded|startswith: 'C:\ProgramData\'

  # Signed=true but certificate NOT valid — stolen/expired/revoked signature (Gentlemen primary pattern)
  selection_invalid_signature:
    Signed: 'true'
    SignatureStatus:
      - 'Expired'
      - 'Revoked'
      - 'NotTrusted'
      - 'Invalid'
      - 'Error'

  # Completely unsigned driver — covers variants that skip signature stealing
  selection_unsigned:
    Signed: 'false'

  # Exclude known legitimate paths (C:\Program Files\ can contain \Temp\ subfolders)
  filter_legit_program_files:
    ImageLoaded|startswith:
      - 'C:\Program Files\'
      - 'C:\Program Files (x86)\'

  # Exclude legitimate EDR/security vendor ProgramData driver paths
  filter_legit_edr_programdata:
    ImageLoaded|startswith:
      - 'C:\ProgramData\CrowdStrike\'
      - 'C:\ProgramData\SentinelOne\'
      - 'C:\ProgramData\Sophos\'
      - 'C:\ProgramData\ESET\'
      - 'C:\ProgramData\Bitdefender\'
      - 'C:\ProgramData\Kaspersky Lab\'
      - 'C:\ProgramData\McAfee\'
      - 'C:\ProgramData\Trellix\'
      - 'C:\ProgramData\Trend Micro\'
      - 'C:\ProgramData\Symantec\'
      - 'C:\ProgramData\Carbon Black\'
      - 'C:\ProgramData\CarbonBlack\'
      - 'C:\ProgramData\Cylance\'
      - 'C:\ProgramData\Malwarebytes\'

  condition: (selection_suspicious_path or selection_programdata_path) and (selection_invalid_signature or selection_unsigned) and not (filter_legit_program_files or filter_legit_edr_programdata)

fields:
  - ImageLoaded
  - Signed
  - SignatureStatus
  - Signature
  - Hashes
  - Computer
  - User

falsepositives:
  - Legitimate vendor drivers with recently expired certificates in non-standard paths — rare, validate hash against ioc/ioc_hashes.csv and vendor advisory
  - Lab or development environments testing driver signing workflows
  - Unsigned drivers from internal development tools — add their paths to filter_legit_edr_programdata
  - Enterprise software storing unsigned helper drivers in ProgramData (partially filtered for known EDR vendors)

level: high
