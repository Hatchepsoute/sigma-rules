logsource:
    product: windows
    category: driver_load
detection:
    selection_abused_driver_name:
        ImageLoaded|endswith:
            - '\eb.sys'
            - '\nseckrnl.sys'
            - '\GameDriverX64.sys'
            - '\vgk.sys'
            - '\stpm_old.sys'
            - '\stpm_new.sys'
            - '\dmx.sys'
            - '\360netmon_wfp.sys'
            - '\IMFForceDelete.sys'
            - '\G11.sys'
            - '\googleApiUtil64.sys'
            - '\ThrottleBlood.sys'
            - '\havoc.sys'
    selection_known_driver_hash:
        Hashes|contains:
            - 'BA914FE77B177B45799403B16DD14765C510A074'   # eb.sys
            - 'B0B912A3FD1C05D72080848EC4C92880004021A1'   # nseckrnl.sys
            - '7556AE58C215B8245A43F764F0676C7A8F0FDD1A'   # vgk.sys (malicious sample)
            - '711EF221526997039E804A18DB9647C91680BBE2'   # stpm_old.sys
            - '68FEC379F2AE76C3D2CE913F7BE650CEA1D06990'   # stpm_new.sys
            - '96F0DBF52AED0AFD43E44500116B04B674F7358E'   # dmx.sys
            - '9AD51AD97C01E97AB59214116740785E0F6320A8'   # 360netmon_wfp.sys
            - '12500F6C87CE62712A0ED6652C57468D15C14223'   # IMFForceDelete.sys
            - '56BEE9DF5833A637F5C54D5911DF98B0812FE643'   # G11.sys (PoisonX)
            - 'EC296F9501AD71E430810CB5CDC38D954D4BA536'   # googleApiUtil64.sys
            - '82ED942A52CDCF120A8919730E00BA37619661A3'   # ThrottleBlood.sys
            - '1FA071303FB846308571E64727501FB98B1C2BE6'   # havoc.sys
    # Legitimate vgk.sys from Riot Vanguard — name-only match only; hash match is unaffected
    filter_legit_vgk:
        ImageLoaded|startswith: 'C:\Program Files\Riot Vanguard\'
    # GameDriverX64.sys and dmx.sys have no confirmed hash — name-only hits need triage
    filter_legit_game_drivers:
        ImageLoaded|startswith:
            - 'C:\Program Files\'
            - 'C:\Program Files (x86)\'
        ImageLoaded|endswith:
            - '\GameDriverX64.sys'
            - '\dmx.sys'
    condition: (selection_abused_driver_name and not (filter_legit_vgk or filter_legit_game_drivers)) or selection_known_driver_hash
fields:
    - ImageLoaded
    - Signed
    - SignatureStatus
    - Hashes
    - Computer
    - User
falsepositives:
    - vgk.sys on gaming endpoints (Riot Vanguard) — filtered for legitimate install path; hash hits are NOT affected
    - GameDriverX64.sys and dmx.sys from Program Files (no confirmed Gentlemen hash) — filtered; any other path warrants triage
    - Authorized red-team / BYOVD research in a controlled lab
    - Security vendor testing of vulnerable-driver blocklists
level: medium
