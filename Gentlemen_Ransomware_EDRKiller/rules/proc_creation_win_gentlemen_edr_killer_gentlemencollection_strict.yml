title: Gentlemen Ransomware - GentleKiller EDR-Killer Staging and Execution - STRICT
id: b7d3e8f2-4a16-4c9b-9d27-5e8a1f0c3b62
status: experimental
description: |
  Detects execution of Gentlemen ransomware EDR-killer binaries, anchored on the actor's invariant staging directory "\GentlemenCollection\" (where GentleKiller, HexKiller, ThrottleBlood and HavocKiller are consistently dropped across unrelated intrusions) and corroborated with the known killer sample SHA-1 hashes. Gentlemen binaries masquerade as legitimate security/anti-cheat vendors (Kaspersky, Valorant, FACEIT, Sophos, Avast, Symantec...) with fabricated version info and invalid copied signatures, so filename alone is unreliable - the staging path and the hashes are the high-confidence anchors.
  STRICT rule: if it fires, treat as an active Gentlemen intrusion in the defense-evasion phase that typically precedes encryption. Isolate the host, hunt for the dropped BYOVD driver (see the BROAD rule) and for mass security-process termination (see the correlation rule), and assume ransomware staging is imminent.
  IoC freshness: hashes may go stale as the actor repacks binaries. The staging path \GentlemenCollection\ is more durable — it has been invariant across multiple unrelated intrusions. See ioc/ioc_hashes.csv for last_verified dates.

references:
    - https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/
    - https://www.bleepingcomputer.com/news/security/gentlemen-ransomware-uses-multiple-edr-killers-to-disable-defenses/
author: ASSIONGBON Adama SOC & CTI Consultant | https://www.linkedin.com/in/adama-assiongbon-9029893a/
date: 2026-06-19
modified: 2026-06-19
tags:
    - attack.defense-evasion
    - attack.t1562.001
    - attack.t1036
    - attack.t1036.001
    - attack.execution
    - attack.t1059.003
logsource:
    product: windows
    category: process_creation
detection:
    selection_staging_path:
        Image|contains: '\GentlemenCollection\'
    selection_known_killer_hash:
        Hashes|contains:
            - '8AE6BD18B129061F63642531F1B684CF0383C75D'   # Kasps.exe (Kaspersky variant)
            - 'D605994FC72A2BB59B5CFB1624A1B9170ECA73A2'   # FaceIT1.exe
            - '5AA3124E5C4921E5EDFC60133B5D71DA21B07DA3'   # Valorant2.exe
            - '331879F5EEC8892BBD896F90BDBB1BAD0BF63BD6'   # EASolo2Light.exe
            - 'F11AEBCCB9A86A7E2E653F90BAEC697F233C255F'   # EASOLO1clear.exe
            - 'EF9CD06683159397F099CAA244E94E6EAAD96EBA'   # EAAntiCheatLight.exe
            - 'A11EE9CDC59E5CAA59AEFD27B30D104F3AD68E62'   # BitD1.exe (WatchDog variant)
            - '2F86898528C6CAB3540C486A9BFAA0C029B73950'   # MB2.exe (Network Blocker variant)
            - 'A19117175DBC9BA4D23B5DCE8415E299A2E32192'   # Deletor.exe (Cleaner variant)
            - 'D29670E684E40DDC89B47010C37CBC96737035B6'   # Symantec.exe (G11 variant)
            - 'CF4D74DF17A91B4A36A2911B22AFEC5D8FA93A01'   # Avast.exe (HexKiller)
            - '7131B377E96016DC1911020C9F95B1B4D042D7B4'   # Sent.exe (ThrottleBlood)
            - 'F0537CBB773AE12100B36731E7C39F5A9D852B14'   # Sophos.exe (HavocKiller)
    condition: selection_staging_path or selection_known_killer_hash
falsepositives:
    - Extremely unlikely - a path literally containing "GentlemenCollection" has no plausible legitimate use
    - Samples submitted voluntarily to an internal sandbox for analysis (verify host and user context)
level: high
