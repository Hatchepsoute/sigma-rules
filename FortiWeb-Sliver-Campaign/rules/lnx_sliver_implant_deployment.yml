title: Possible Sliver implant deployment on FortiWeb or Linux host
id: 5b8c3a2d-7f1e-4e32-b1d9-64f9c8a1e3f2
status: experimental
description: >
  Detects Sliver implant deployment: system-updater or cups-lpd binary creation in hidden directories (FortiWeb campaign).
custom:
  description_fr: >
    Détecte la création du binaire system-updater ou cups-lpd dans des répertoires cachés spécifiques
    à la campagne FortiWeb Sliver, ou la création de fichiers dans des répertoires temporaires cachés
    génériques. Correspond au pattern de déploiement d'artefact post-exploitation de la campagne.
references:
  - https://ctrlaltintel.com/threat%20research/FortiWeb-Sliver/
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-01-08
modified: 2026-06-21
related:
  - id: a9f2b4c1-8d3e-45f6-92a7-12b345c6d789
    type: similar
  - id: c3e7f5a8-1b2d-4f9c-88a0-9d1e2f3a4b5c
    type: similar
tags:
  - attack.persistence
  - attack.t1036
  - attack.t1036.005
  - attack.execution
logsource:
  category: file_event
  product: linux

detection:
  # Campaign-specific paths observed in the FortiWeb Sliver intrusion (high confidence).
  selection_specific:
    TargetFilename|endswith:
      - '/.root/system-updater'
      - '/app/web/system-updater'
      - '/.root/cups-lpd'

  # Hidden files in writable directories — common staging tactic.
  selection_generic:
    TargetFilename|contains:
      - '/bin/.root/'
      - '/var/tmp/.'
      - '/dev/shm/.'

  # Angle mort: Sliver implants can be dropped in other locations not observed in FortiWeb campaign.
  # These paths cover documented Sliver operator staging preferences from threat intelligence reports.
  selection_extended_paths:
    TargetFilename|contains:
      - '/usr/local/bin/.'    # hidden file in a system binary path
      - '/usr/share/.'        # hidden file under shared resources
      - '/root/.config/'      # hidden config directory (XDG-style abuse)
      - '/root/.cache/'
      - '/home/nobody/'       # nobody home dir abuse (service account)
      - '/var/lib/.'          # hidden files under var/lib (mimics service state data)

  condition: 1 of selection_*

fields:
  - Computer
  - User
  - Image
  - TargetFilename
  - CreationUtcTime

falsepositives:
  - Legitimate system update processes writing to campaign-specific paths (no known case)
  - selection_extended_paths: package managers or configuration management tools (Ansible, Chef) writing hidden files under /usr/local/bin or /root/.config; verify the writing process (Image) against known admin tools

level: critical
