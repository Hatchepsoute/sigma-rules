title: Possible Sliver implant deployment on FortiWeb or Linux host
id: 5b8c3a2d-7f1e-4e32-b1d9-64f9c8a1e3f2
status: experimental
description: >
  Detects Sliver implant deployment: system-updater or cups-lpd binary creation in hidden directories (FortiWeb campaign).
custom:
  description_fr: >
    Détecte la création du binaire system-updater ou cups-lpd dans des répertoires cachés spécifiques
    à la campagne FortiWeb Sliver, ou la création de fichiers dans des répertoires temporaires cachés
    génériques. Correspond au pattern de déploiement d'artefact post-exploitation de la campagne.
references:
  - https://ctrlaltintel.com/threat%20research/FortiWeb-Sliver/
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-01-08
modified: 2026-06-19
related:
  - id: a9f2b4c1-8d3e-45f6-92a7-12b345c6d789
    type: similar
  - id: c3e7f5a8-1b2d-4f9c-88a0-9d1e2f3a4b5c
    type: similar
tags:
  - attack.persistence
  - attack.t1036
  - attack.t1036.005
  - attack.execution
logsource:
  category: file_event
  product: linux

detection:
  selection_specific:
    TargetFilename|endswith:
      - '/.root/system-updater'
      - '/app/web/system-updater'
      - '/.root/cups-lpd'

  selection_generic:
    TargetFilename|contains:
      - '/bin/.root/'
      - '/var/tmp/.'
      - '/dev/shm/.'

  condition: 1 of selection_*

fields:
  - Computer
  - User
  - Image
  - TargetFilename
  - CreationUtcTime

falsepositives:
  - Legitimate system update processes writing to these specific paths (no known case)

level: critical
