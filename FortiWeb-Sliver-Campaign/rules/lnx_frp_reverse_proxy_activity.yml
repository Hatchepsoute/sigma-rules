title: Fast reverse proxy (FRP) client or server execution on Linux
id: 7d12a3b4-e9c8-4f51-b8d2-3a1b4c5d6e7f
status: experimental
description: >
  Detects frpc or frps execution on Linux, post-exploitation C2 tunneling tool abused in Sliver campaign.
custom:
  description_fr: >
    Détecte l'exécution du binaire FRP (Fast Reverse Proxy) client (frpc) ou serveur (frps) sur Linux.
    FRP est un outil légitime open-source fréquemment abusé en post-exploitation pour le tunneling C2
    et le contournement de firewall. La détection basée sur l'image évite les faux positifs de sous-chaîne
    (xfrpc, ifrpc). frps est aussi suspect sur un hôte compromis. Le filtre filter_authorized_vpn exclut
    les chemins d'installation légitimes connus. ANGLE MORT : si frpc est renommé ou exécuté depuis un
    chemin personnalisé non couvert par filter_authorized_vpn, la règle déclenche (FP légitime possible).
references:
  - https://github.com/fatedier/frp
  - https://attack.mitre.org/techniques/T1572/
  - https://ctrlaltintel.com/threat%20research/FortiWeb-Sliver/
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-01-08
modified: 2026-06-19
related:
  - id: 8f3c2e91-7b6a-4e77-9cfa-2a1e9d4cbe12
    type: similar
  - id: c3e7f5a8-1b2d-4f9c-88a0-9d1e2f3a4b5c
    type: similar
tags:
  - attack.t1572
  - attack.command-and-control
logsource:
  category: process_creation
  product: linux

detection:
  selection_frp_binary:
    Image|endswith:
      - '/frpc'
      - '/frps'

  selection_frp_cli_invoke:
    CommandLine|contains|all:
      - 'frpc'
      - '.toml'

  selection_frps_cli_invoke:
    CommandLine|contains|all:
      - 'frps'
      - '.toml'

  filter_authorized_vpn:
    Image|startswith:
      - '/etc/frp/'
      - '/usr/local/etc/frp/'
      - '/opt/frp/'

  condition: (selection_frp_binary or selection_frp_cli_invoke or selection_frps_cli_invoke) and not filter_authorized_vpn

fields:
  - Computer
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - ProcessId
  - ParentProcessId

falsepositives:
  - Authorized remote maintenance using FRP in enterprise VPN infrastructure
  - DevOps tunneling for SSH forwarding in approved CI/CD pipelines
  - Corporate remote access solutions built on FRP (filter by Image path via filter_authorized_vpn)

level: medium
