title: TheGentlemen ransomware - EDR killer security process or service termination
id: c4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f80
status: experimental
description: "Detects CLI-based termination or disabling of security processes and services used by TheGentlemen-style EDR killers."
references:
  - https://www.bleepingcomputer.com/news/security/gentlemen-ransomware-uses-multiple-edr-killers-to-disable-defenses/
  - https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/
  - https://attack.mitre.org/techniques/T1562/001/
  - https://attack.mitre.org/techniques/T1489/
author: Adama ASSIONGBON
date: 2026-06-19
modified: 2026-06-20
related:
  - id: b7d3e8f2-4a16-4c9b-9d27-5e8a1f0c3b62
    type: derived
  - id: d5f6a7b8-c9d0-4e1f-2a3b-4c5d6e7f8091
    type: derived
  - id: e6a7b8c9-d0e1-4f2a-3b4c-5d6e7f809102
    type: derived



tags:
  - attack.defense-evasion
  - attack.impact
  - attack.t1562.001
  - attack.t1489

logsource:
  product: windows
  category: process_creation

detection:
  # taskkill /F /IM <process>, name-based forced kill
  selection_taskkill_im:
    Image|endswith: '\taskkill.exe'
    CommandLine|contains|all:
      - '/F'
      - '/IM'

  # sc stop / sc delete / sc config ... start= disabled, service disabling
  selection_sc_stop:
    Image|endswith: '\sc.exe'
    CommandLine|contains:
      - ' stop '
      - ' delete '
      - 'start= disabled'
      - 'start=disabled'

  # net stop / net1 stop
  selection_net_stop:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains: ' stop '

  # WMIC process termination, evades taskkill-based detection
  selection_wmic_kill:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'process'
      - 'terminate'

  # PowerShell Stop-Process and Set-Service, evades taskkill-based detection
  selection_ps_stopprocess:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Stop-Process'
      - 'Set-Service'

  # Security processes and services targeted by TheGentlemen EDR killers
  selection_security_targets:
    CommandLine|contains:
      # Microsoft Defender / Windows Security
      - 'MsMpEng.exe'
      - 'MpCmdRun.exe'
      - 'MsSense.exe'
      - 'SecurityHealthService'
      - 'WinDefend'
      # CrowdStrike Falcon
      - 'CSFalconService'
      - 'CSFalconContainer'
      - 'CsFalconService'
      # SentinelOne
      - 'SentinelAgent'
      - 'SentinelOne'
      - 'SentinelServiceHost'
      - 'sentineld'
      # Palo Alto Cortex XDR / Traps
      - 'coreServiceShell'
      - 'Traps.exe'
      - 'CortexXDR'
      # Sophos
      - 'SophosHealth'
      - 'SophosFIM'
      - 'SAVService'
      # ESET
      - 'ekrn.exe'
      - 'egui.exe'
      - 'EsetSvc'
      # Bitdefender
      - 'bdagent'
      - 'bdredline'
      - 'bdntwrk'
      - 'vsserv.exe'
      # Kaspersky
      - 'avp.exe'
      - 'kavtray'
      - 'klnagent'
      # Trend Micro
      - 'TmListen'
      - 'ntrtscan'
      - 'TrendMicroAmsp'
      - 'coreFrameworkHost'
      # Carbon Black / VMware
      - 'CarbonBlack'
      - 'cbdefense'
      - 'cbstream'
      - 'cb.exe'
      # Trellix / McAfee / FireEye
      - 'xagt.exe'
      - 'masvc'
      - 'McAfeeFramework'
      # Cylance
      - 'CylanceSvc'
      # Malwarebytes
      - 'MBAMService'
      # Cybereason
      - 'cyserver'
      - 'minionhost'
      # Webroot
      - 'WRSA.exe'
      # Deep Security (Trend Micro)
      - 'ds_agent'
      # Fortinet EDR
      - 'fortiedr'
      # Huntress
      - 'HuntressAgent'
      # Elastic
      - 'elastic-agent'
      # Symantec / Broadcom
      - 'SepMasterService'
      - 'ccSvcHst.exe'

  filter_main_legitimate_mgmt:
    ParentImage|endswith:
      - '\sccmexec.exe'
      - '\ccmexec.exe'
      - '\msiexec.exe'
      - '\pdqdeploy.exe'
      - '\intuneManagementExtension.exe'
      - '\chocolatey.exe'
      - '\TiWorker.exe'
      - '\TrustedInstaller.exe'

  # NOTE: taskkill /F /PID is intentionally excluded, PID-based kills carry no process name
  # in CommandLine, so selection_security_targets can never match. Use the behavioral
  # correlation rule (process_access) to cover API-level and PID-based termination.
  condition: (selection_taskkill_im or selection_sc_stop or selection_net_stop or selection_wmic_kill or selection_ps_stopprocess) and selection_security_targets and not filter_main_legitimate_mgmt

fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - IntegrityLevel

falsepositives:
  - Legitimate IT administrator manually stopping a security service (validate with change management ticket)
  - EDR or security platform self-update process temporarily stopping its own service (check ParentImage)
  - Vendor-provided uninstaller script stopping services as part of a documented migration
  - Automated patch management tools (SCCM, Intune, PDQ, TrustedInstaller), partially filtered; validate ParentImage
  - PowerShell scripts with Stop-Process for legitimate maintenance, validate CommandLine and scheduling context

level: medium
