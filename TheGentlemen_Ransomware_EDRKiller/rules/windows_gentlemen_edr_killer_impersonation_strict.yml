title: TheGentlemen ransomware - GentleKiller security tool impersonation from suspicious path
id: d5f6a7b8-c9d0-4e1f-2a3b-4c5d6e7f8091
status: experimental
description: "Detects security product impersonation from suspicious paths consistent with TheGentlemen EDR killer staging."
related:
  - id: c4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f80
    type: similar
  - id: e6a7b8c9-d0e1-4f2a-3b4c-5d6e7f809102
    type: similar
  - id: a2f6c1e4-9b73-4d8a-8e51-6c2f0a3d7b94
    type: similar
  - id: d4b8f2a1-6c95-4e3d-9f08-2a7e1b5c8d63
    type: similar

references:
  - https://www.bleepingcomputer.com/news/security/gentlemen-ransomware-uses-multiple-edr-killers-to-disable-defenses/
  - https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/
  - https://attack.mitre.org/techniques/T1562/001/
  - https://attack.mitre.org/techniques/T1036/005/

author: Adama ASSIONGBON
date: 2026-06-19
modified: 2026-06-20

tags:
  - attack.t1036.005

logsource:
  product: windows
  category: process_creation

detection:
  # Explicit EDR killer tool names, fire on any path
  selection_explicit_edr_killer:
    Image|contains:
      - 'GentleKiller'
      - 'HexKiller'
      - 'ThrottleBlood'
      - 'HavocKiller'
      - 'OxideHarvest'

  # Security / gaming product name impersonation
  selection_impersonating_name:
    Image|contains:
      # Kaspersky
      - 'kaspersky'
      - 'Kaspersky'
      - 'Kasps'
      # Watchdog
      - 'watchdog'
      - 'WatchDog'
      # Javelin
      - 'javelin'
      - 'Javelin'
      # Gaming / anti-cheat
      - 'valorant'
      - 'Valorant'
      - 'vanguard'
      - 'FaceIT'
      - 'faceit'
      - 'EAAntiCheat'
      - 'EASolo'
      # Security vendors
      - 'SentinelOne'
      - 'sentinelone'
      - 'CrowdStrike'
      - 'crowdstrike'
      - 'Sophos'
      - 'sophos'
      - 'BitDefender'
      - 'bitdefender'
      - 'Symantec'
      - 'symantec'
      - 'McAfee'
      - 'mcafee'
      - 'Trellix'
      - 'trellix'
      - 'Malwarebytes'
      - 'malwarebytes'
      - 'Webroot'
      - 'webroot'
      - 'TrendMicro'
      - 'trendmicro'
      - 'ESET'
      - 'eset'
      - 'Avast'
      - 'avast'

  # User-writable and non-standard execution paths
  selection_suspicious_path:
    Image|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Downloads\'
      - '\Users\Public\'
      - '\ProgramData\'
      - '\Perflogs\'
      - '\Intel\'
      - '\Recovery\'

  # Legitimate installation paths - cover both Program Files AND ProgramData,
  # because selection_suspicious_path includes \ProgramData\ which many EDR vendors use.
  filter_legit_kaspersky:
    Image|startswith:
      - 'C:\Program Files (x86)\Kaspersky Lab\'
      - 'C:\Program Files\Kaspersky Lab\'
      - 'C:\ProgramData\Kaspersky Lab\'

  filter_legit_sentinelone:
    Image|startswith:
      - 'C:\Program Files\SentinelOne\'
      - 'C:\ProgramData\Sentinel\'

  filter_legit_crowdstrike:
    Image|startswith:
      - 'C:\Program Files\CrowdStrike\'
      - 'C:\ProgramData\CrowdStrike\'

  filter_legit_sophos:
    Image|startswith:
      - 'C:\Program Files\Sophos\'
      - 'C:\Program Files (x86)\Sophos\'
      - 'C:\ProgramData\Sophos\'

  filter_legit_bitdefender:
    Image|startswith:
      - 'C:\Program Files\Bitdefender\'
      - 'C:\Program Files (x86)\Bitdefender\'
      - 'C:\ProgramData\Bitdefender\'

  filter_legit_vanguard:
    Image|startswith:
      - 'C:\Program Files\Riot Vanguard\'
      - 'C:\Program Files (x86)\Riot Games\'
      - 'C:\Riot Games\'
      - 'C:\ProgramData\Riot Games\'

  filter_legit_symantec:
    Image|startswith:
      - 'C:\Program Files\Symantec\'
      - 'C:\Program Files (x86)\Symantec\'
      - 'C:\ProgramData\Symantec\'

  filter_legit_mcafee:
    Image|startswith:
      - 'C:\Program Files\McAfee\'
      - 'C:\Program Files (x86)\McAfee\'
      - 'C:\Program Files\Trellix\'
      - 'C:\ProgramData\McAfee\'
      - 'C:\ProgramData\Trellix\'

  filter_legit_eset:
    Image|startswith:
      - 'C:\Program Files\ESET\'
      - 'C:\Program Files (x86)\ESET\'
      - 'C:\ProgramData\ESET\'

  filter_legit_trend:
    Image|startswith:
      - 'C:\Program Files\Trend Micro\'
      - 'C:\Program Files (x86)\Trend Micro\'
      - 'C:\ProgramData\Trend Micro\'

  filter_legit_avast:
    Image|startswith:
      - 'C:\Program Files\Avast Software\'
      - 'C:\Program Files (x86)\Avast Software\'
      - 'C:\ProgramData\Avast Software\'

  filter_legit_malwarebytes:
    Image|startswith:
      - 'C:\Program Files\Malwarebytes\'
      - 'C:\Program Files (x86)\Malwarebytes\'
      - 'C:\ProgramData\Malwarebytes\'

  filter_legit_webroot:
    Image|startswith:
      - 'C:\Program Files\Webroot\'
      - 'C:\Program Files (x86)\Webroot\'
      - 'C:\ProgramData\WRData\'

  filter_legit_faceit:
    Image|startswith:
      - 'C:\Program Files\FACEIT\'
      - 'C:\ProgramData\FACEIT\'

  filter_legit_ea_anticheat:
    Image|startswith:
      - 'C:\Program Files\EA Anti-Cheat\'
      - 'C:\Program Files (x86)\EA Games\'
      - 'C:\Program Files\EA Games\'

  condition: selection_explicit_edr_killer or (selection_impersonating_name and selection_suspicious_path and not (filter_legit_kaspersky or filter_legit_sentinelone or filter_legit_crowdstrike or filter_legit_sophos or filter_legit_bitdefender or filter_legit_vanguard or filter_legit_symantec or filter_legit_mcafee or filter_legit_eset or filter_legit_trend or filter_legit_avast or filter_legit_malwarebytes or filter_legit_webroot or filter_legit_faceit or filter_legit_ea_anticheat))

fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - IntegrityLevel
  - CurrentDirectory

falsepositives:
  - Explicit EDR killer names (GentleKiller, HexKiller, etc.): virtually no legitimate use, investigate immediately
  - Impersonation + suspicious path: legitimate security software never runs from Temp/AppData/Downloads, verify with vendor and change ticket
  - EDR vendors writing helper binaries to ProgramData during updates - covered by ProgramData path entries in each filter; if a new vendor fires, add its ProgramData path to the relevant filter
  - FaceIT or EA Anti-Cheat installers staging in ProgramData before setup completes, filtered; validate ParentImage against the vendor installer

level: high
