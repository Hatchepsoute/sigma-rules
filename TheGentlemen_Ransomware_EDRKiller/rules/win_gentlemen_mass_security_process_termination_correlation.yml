title: Security product process access (building block for EDR-killer correlation)
id: c9e1a4d6-3f82-4b7e-8a14-7d0b6c5e2f31
name: gentlemen_security_process_access
status: experimental
description: |
  Building-block rule: a process opening a handle to a known security/EDR product process. Not actionable on its own (security tools and the OS access each other constantly); it exists only to feed the mass-termination correlation below. Behavioral by design - resilient to EDR-killer renaming because it keys on the TARGET security processes, not on the attacker tool.
  DEPLOYMENT REQUIREMENT: this rule uses Sysmon Event ID 10 (ProcessAccess). Default Sysmon configurations do NOT log all process access events. You must explicitly configure ProcessAccess events targeting the security processes listed below, otherwise this rule and the correlation above it will never fire. Example Sysmon config entry: <ProcessAccess onmatch="include"><TargetImage condition="end with">MsMpEng.exe</TargetImage></ProcessAccess>
  BLIND SPOT: if GentleKiller uses process hollowing to inject into a legitimate process (e.g. explorer.exe, svchost.exe), SourceImage will show the host process rather than the malicious binary. The correlation still fires but the analyst sees a legitimate-looking source, add SourceProcessId to your investigation workflow.

references:
    - https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/
author: ASSIONGBON Adama SOC & CTI Consultant | https://www.linkedin.com/in/adama-assiongbon-9029893a/
date: 2026-06-19
modified: 2026-06-20
tags:
    - attack.defense-evasion
    - attack.t1562.001
logsource:
    product: windows
    category: process_access
detection:
    selection_security_targets:
        TargetImage|endswith:
            - '\MsMpEng.exe'
            - '\MsSense.exe'
            - '\SecurityHealthService.exe'
            - '\CSFalconService.exe'
            - '\CSFalconContainer.exe'
            - '\SentinelAgent.exe'
            - '\SentinelServiceHost.exe'
            - '\SentinelStaticEngine.exe'
            - '\ekrn.exe'
            - '\egui.exe'
            - '\bdservicehost.exe'
            - '\bdagent.exe'
            - '\bdredline.exe'
            - '\avp.exe'
            - '\kavfs.exe'
            - '\klnagent.exe'
            - '\mcshield.exe'
            - '\masvc.exe'
            - '\xagt.exe'
            - '\PccNTMon.exe'
            - '\coreServiceShell.exe'
            - '\ds_agent.exe'
            - '\cb.exe'
            - '\RepMgr.exe'
            - '\CylanceSvc.exe'
            - '\MBAMService.exe'
            - '\cybereason.exe'
            - '\cortexService.exe'
            - '\Traps.exe'
            - '\fortiedr.exe'
            - '\SophosFS.exe'
            - '\SAVService.exe'
            - '\HuntressAgent.exe'
            - '\elastic-agent.exe'
            - '\ccSvcHst.exe'
            - '\SepMasterService.exe'
            - '\WRSA.exe'
            - '\TaniumClient.exe'
            - '\Sysmon.exe'
            - '\Sysmon64.exe'
    # BLIND SPOT FIX 2026-06-21 (second pass): `wmiprvse.exe` was in the allowlist but it is
    # a known attack vector — GentleKiller can invoke WMI to terminate EDR processes, in which
    # case wmiprvse.exe appears as SourceImage. Removing it from the filter so that mass
    # security-process access via WMI triggers the correlation.
    # svchost.exe is intentionally kept because EDR products legitimately use service-host
    # child processes to inspect each other, and mass-termination via injected svchost would
    # still fire the correlation (threshold = 8 distinct targets within 1 min).
    filter_legit_sources:
        SourceImage|endswith:
            - '\services.exe'
            - '\svchost.exe'
            - '\lsass.exe'
            - '\MsMpEng.exe'
            - '\CSFalconService.exe'
            - '\SentinelAgent.exe'
            - '\taskmgr.exe'
            - '\msiexec.exe'
            - '\TrustedInstaller.exe'
            - '\wuauclt.exe'
            - '\UsoClient.exe'
            - '\SearchIndexer.exe'
    condition: selection_security_targets and not filter_legit_sources
fields:
    - SourceImage
    - SourceProcessId
    - TargetImage
    - TargetProcessId
    - GrantedAccess
    - Computer
falsepositives:
    - Endpoint management / inventory tools legitimately enumerating processes (add to filter_legit_sources)
    - Security products inspecting one another - tune filter_legit_sources to your stack
level: informational
