title: Kernel rootkit high-confidence correlation (driver load + service creation)
id: 7998e5ca-ed58-11f0-b925-83f625c1804d
status: experimental
description: "Correlates Sysmon kernel driver load and kernel service creation for high-confidence rootkit detection."
references:
  - https://securelist.com/honeymyte-kernel-mode-rootkit/118590/
  - https://attack.mitre.org/techniques/T1014/
  - https://attack.mitre.org/techniques/T1547/
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-06-18
modified: 2026-06-19
related:
  - id: 7e2a6a12-9c6d-4c2a-8b2f-2e8bb6b2b6a1
    type: similar
  - id: 6778f01a-ed58-11f0-a580-aff152632512
    type: similar
tags:
  - attack.persistence
  - attack.defense-evasion
  - attack.t1014
  - attack.t1547
logsource:
  product: windows

detection:
  # BLIND SPOT FIX 2026-06-21: EventID 6 without product/service constraint is ambiguous -
  # other applications can emit EID 6 for unrelated reasons (e.g. Windows Filtering Platform logs).
  # Added Sysmon provider context via Provider field. In environments without Sysmon, this rule will
  # not fire; run mvdr-01 and mvdr-02 independently for full coverage.
  # Note: the logsource is intentionally 'product: windows' (no service) to allow the SIEM to join
  # events from both Sysmon (EID 6) and Windows System log (EID 7045). Add a Provider constraint
  # if your SIEM allows cross-source field filtering.
  selection_driver_load:
    EventID: 6
    Provider: 'Microsoft-Windows-Sysmon'

  selection_kernel_service:
    EventID: 7045
    ServiceType: kernel driver

  condition: selection_driver_load and selection_kernel_service

fields:
  - UtcTime
  - Computer
  - EventID
  - ImageLoaded
  - Signed
  - ServiceName
  - ServiceType
  - ImagePath

falsepositives:
  - Simultaneous legitimate driver load and service creation during OS patch or driver update
  - Hardware vendor tooling that installs and registers kernel drivers in sequence

level: critical
