title: Microsoft Office spawning LOLBin or script engine
id: f94eb6ef-dccf-481b-92c8-8a6c844b8355
status: experimental
description: Broad detection for Office apps spawning LOLBins or script engines. Use for triage and hunting across Office-based exploitation chains.
custom:
  description_fr: "Détection large des applications Microsoft Office lançant des LOLBins communs ou des moteurs de script. Destinée au triage et au hunting. Comportement fréquemment observé dans les chaînes d'exploitation Office (documents malveillants, exécution de contenu externe), incluant plusieurs CVE Office."
references:
  - https://attack.mitre.org/techniques/T1204/002/
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2025-12-23
modified: 2026-06-19
related:
  - id: a6f0558c-14a3-44e0-88f9-605044bb3ecc
    type: similar
tags:
  - attack.execution
  - attack.t1204.002
  - attack.t1059
  - attack.t1059.001
  - attack.t1218
logsource:
  product: windows
  category: process_creation

detection:
  selection_office_parent:
    ParentImage|endswith:
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\msaccess.exe'
      - '\visio.exe'
      - '\onenote.exe'

  selection_lolbin_or_script_child:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\regsvr32.exe'
      - '\msiexec.exe'
      - '\bitsadmin.exe'
      - '\certutil.exe'
      - '\schtasks.exe'
      - '\forfiles.exe'
      - '\pcalua.exe'
      - '\odbcconf.exe'
      - '\wmic.exe'
      - '\curl.exe'

  # /automation, /pt, /embedding are standard COM/OLE invocation modes used by legitimate integrations
  filter_main_office_automation:
    ParentCommandLine|contains:
      - '/automation'
      - '/pt '
      - '/embedding'

  condition: selection_office_parent and selection_lolbin_or_script_child and not filter_main_office_automation

fields:
  - UtcTime
  - Computer
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - IntegrityLevel
  - ProcessId
  - ParentProcessId

falsepositives:
  - Legitimate Office add-ins or automation that launches scripts/tools (validate with IT change tickets)
  - Enterprise templates/macros invoking PowerShell for approved tasks
  - COM/OLE automation invocations (covered by filter_main_office_automation)

level: medium
