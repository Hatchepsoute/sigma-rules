title: Infostealer high-confidence credential access and exfiltration
id: 50f27880-01d7-42b2-9368-0939504fa162
status: experimental
description: >
  High-confidence detection of infostealer activity combining suspicious LOLBIN execution,
  browser credential store access, and network exfiltration. Single-rule fallback for environments
  without correlation capability; use the three-stage correlated rules in Infostealer_STRICT_Correlated
  for better precision.
references:
  - https://www.dexpose.io/deep-dive-into-arkanix-stealer-and-its-infrastructure/
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-01-06
modified: 2026-06-22
related:
  - id: 26090645-90c0-40ee-9aa9-5d0037b33ae7
    type: similar
  - id: 12caf5be-99d5-432d-b049-ba9263962835
    type: similar
  - id: 9ddb6120-1dd5-4bc4-9a3e-bebe5a1afc52
    type: similar
tags:
  - attack.execution
  - attack.t1059
  - attack.credential-access
  - attack.t1555
  - attack.exfiltration
  - attack.t1041
logsource:
  product: windows
  category: process_creation

detection:
  selection_exec_lolbin:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\mshta.exe'
      - '\rundll32.exe'

  selection_exec_userpath:
    Image|contains:
      - '\Users\'
      - '\AppData\'
      - '\Downloads\'

  filter_system_temp:
    Image|startswith:
      - 'C:\Windows\Temp\'
      - 'C:\Windows\System32\'

  selection_creds:
    CommandLine|contains:
      - 'Login Data'
      - 'Cookies'
      - 'CryptUnprotectData'
      # BLIND SPOT FIX 2026-06-22 (second pass): DPAPI offline technique — attacker copies
      # DPAPI master key blobs from AppData\Roaming\Microsoft\Protect\ and decrypts elsewhere,
      # never touching 'Login Data' or 'Cookies' files directly. Adding DPAPI paths and
      # VSS/shadow copy access patterns to catch this evasion variant.
      - '\Microsoft\Protect\'
      - 'HarvestKeyBlobs'
      - 'dpapi'
      - 'lsadump::cache'
      - 'sekurlsa::dpapi'

  selection_net:
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'Invoke-WebRequest'
      - 'curl'
      - 'wget'

  condition: (selection_exec_lolbin or (selection_exec_userpath and not filter_system_temp)) and selection_creds and selection_net

fields:
  - UtcTime
  - Computer
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - IntegrityLevel
  - ProcessId

falsepositives:
  - Authorized forensic tools accessing credential stores for legitimate investigation

level: critical
