title: Infostealer non-browser process accessing browser credential stores (step 2 of 3)
id: 12caf5be-99d5-432d-b049-ba9263962835
status: experimental
description: >
  Step 2 of correlated infostealer detection: a non-browser process accessing browser credential
  stores. Correlate this alert with step 1 (suspicious execution) and step 3 (public egress)
  to confirm infostealer activity.
references:
  - https://www.dexpose.io/deep-dive-into-arkanix-stealer-and-its-infrastructure/
  - https://attack.mitre.org/techniques/T1555/
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-01-06
modified: 2026-06-21
# SECOND PASS 2026-06-21: added DPAPI master key access coverage (offline DPAPI exfil blind spot).
# A non-browser process reading DPAPI master keys from Protect\ is a strong infostealer signal.
related:
  - id: 26090645-90c0-40ee-9aa9-5d0037b33ae7
    type: similar
  - id: 9ddb6120-1dd5-4bc4-9a3e-bebe5a1afc52
    type: similar
  - id: 50f27880-01d7-42b2-9368-0939504fa162
    type: similar
tags:
  - attack.credential-access
  - attack.t1555
logsource:
  product: windows
  category: file_event

detection:
  selection_chromium_paths:
    TargetFilename|contains:
      - '\\AppData\\Local\\Google\\Chrome\\User Data\\'
      - '\\AppData\\Local\\Microsoft\\Edge\\User Data\\'

  selection_chromium_files:
    TargetFilename|endswith:
      - '\\Login Data'
      - '\\Cookies'
      - '\\Web Data'
      - '\\Local State'

  selection_firefox_paths:
    TargetFilename|contains:
      - '\\AppData\\Roaming\\Mozilla\\Firefox\\Profiles\\'

  selection_firefox_files:
    TargetFilename|endswith:
      - '\\key4.db'
      - '\\logins.json'
      - '\\cookies.sqlite'

  # BLIND SPOT FIX 2026-06-21 (second pass): DPAPI offline exfiltration bypasses this rule.
  # An attacker can copy NTUSER.DAT (contains DPAPI master keys) via Volume Shadow Copy, then
  # decrypt browser secrets on an attacker-controlled machine - no direct access to Login Data
  # or Cookies files is required. Coverage: add DPAPI master key store paths.
  selection_dpapi_masterkey:
    TargetFilename|contains:
      - '\AppData\Roaming\Microsoft\Protect\'

  selection_dpapi_files:
    TargetFilename|re: '(?i)\\AppData\\Roaming\\Microsoft\\Protect\\[^\\]+\\[A-F0-9]{8}-[A-F0-9]{4}-'

  filter_known_browsers:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\brave.exe'
      - '\opera.exe'
      - '\vivaldi.exe'
      - '\waterfox.exe'
      - '\librewolf.exe'
      - '\chromium.exe'

  # DPAPI master key files are legitimately accessed by lsass.exe and the user's session
  filter_dpapi_legit:
    Image|endswith:
      - '\lsass.exe'
      - '\svchost.exe'
      - '\dpapimig.exe'
      - '\dpmemory.exe'

  condition: (
    ((selection_chromium_paths and selection_chromium_files) or (selection_firefox_paths and selection_firefox_files)) and not filter_known_browsers
    ) or (
    selection_dpapi_masterkey and selection_dpapi_files and not filter_dpapi_legit
    )

fields:
  - UtcTime
  - Computer
  - User
  - Image
  - TargetFilename
  - CreationUtcTime

falsepositives:
  - Password managers and enterprise browser security tools accessing browser credential stores
  - Forensic/backup agents (should be signed and ticketed)
  - Backup solutions accessing DPAPI master keys via VSS (validate Image signer and ticket)
  - Enterprise credential sync tools reading Protect\ master key files (rare; add to filter_dpapi_legit by path)

level: critical
